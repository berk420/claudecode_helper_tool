name: Daily AI News to Telegram

on:
  schedule:
    # Her gun saat 08:00 UTC (Turkiye 11:00)
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Fetch AI news and send to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install anthropic --quiet

          python3 << 'PYEOF'
          # -*- coding: utf-8 -*-
          import anthropic, urllib.request, urllib.error, json, sys, os
          import xml.etree.ElementTree as ET
          from datetime import datetime, timezone, timedelta
          from email.utils import parsedate_to_datetime

          MONTHS_TR = {
              "January": "Ocak", "February": "Şubat", "March": "Mart",
              "April": "Nisan", "May": "Mayıs", "June": "Haziran",
              "July": "Temmuz", "August": "Ağustos", "September": "Eylül",
              "October": "Ekim", "November": "Kasım", "December": "Aralık"
          }
          today = datetime.now(timezone.utc)
          TODAY_STR = today.strftime("%d %B %Y")
          for en, tr in MONTHS_TR.items():
              TODAY_STR = TODAY_STR.replace(en, tr)

          BOT_TOKEN = os.environ["TELEGRAM_BOT_TOKEN"]
          CHAT_ID   = os.environ["TELEGRAM_CHAT_ID"]
          API_KEY   = os.environ["ANTHROPIC_API_KEY"]

          RSS_FEEDS = [
              "https://techcrunch.com/category/artificial-intelligence/feed/",
              "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml",
              "https://venturebeat.com/ai/feed/",
              "https://www.anthropic.com/news/rss.xml",
          ]

          def fetch_rss(url, cutoff_hours=48):
              try:
                  req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
                  with urllib.request.urlopen(req, timeout=12) as r:
                      raw = r.read()
                  root = ET.fromstring(raw)
                  ns = {"atom": "http://www.w3.org/2005/Atom"}
                  cutoff = today - timedelta(hours=cutoff_hours)
                  items = []

                  for item in root.findall(".//item"):
                      title = (item.findtext("title") or "").strip()
                      link  = (item.findtext("link")  or "").strip()
                      pub   = item.findtext("pubDate") or ""
                      try:
                          pub_dt = parsedate_to_datetime(pub)
                          if pub_dt.tzinfo is None:
                              pub_dt = pub_dt.replace(tzinfo=timezone.utc)
                          if pub_dt < cutoff:
                              continue
                      except Exception:
                          pass
                      if title and link:
                          items.append("- {}\n  {}".format(title, link))

                  for entry in root.findall("atom:entry", ns):
                      title   = (entry.findtext("atom:title", "", ns) or "").strip()
                      link_el = entry.find("atom:link", ns)
                      link    = link_el.get("href", "") if link_el is not None else ""
                      if title and link:
                          items.append("- {}\n  {}".format(title, link))

                  return items[:10]
              except Exception as e:
                  print("RSS error {}: {}".format(url, e))
                  return []

          all_items = []
          for feed_url in RSS_FEEDS:
              items = fetch_rss(feed_url)
              all_items.extend(items)
              print("  {}: {} haber".format(feed_url, len(items)))

          if not all_items:
              print("Hic haber bulunamadi.")
              sys.exit(1)

          headlines = "\n".join(all_items[:40])
          print("Toplam {} haber toplandi.".format(len(all_items)))

          client = anthropic.Anthropic(api_key=API_KEY)

          prompt = (
              "Bugunun tarihi " + TODAY_STR + ". Asagida AI haber sitelerinden derlenmis basliklar var.\n\n"
              + headlines
              + "\n\nGorevin:\n"
              "1. En onemli 3 genel AI haberini sec (arastirma, sirket, etik/politika, urun gibi farkli kategorilerden)\n"
              "2. Anthropic veya Claude ile ilgili 1 haber sec (yoksa en yakin olanini sec)\n"
              "3. Her biri icin 2-3 cumle Turkce ozet yaz\n\n"
              "SADECE asagidaki Telegram Markdown formatinda cikti ver, baska hicbir sey ekleme:\n\n"
              "*\U0001f916 Gunun AI Haberleri — " + TODAY_STR + "*\n\n"
              "*1. [baslik]*\n[2-3 cumle Turkce ozet]\n[Kaynak](url)\n\n"
              "*2. [baslik]*\n[2-3 cumle Turkce ozet]\n[Kaynak](url)\n\n"
              "*3. [baslik]*\n[2-3 cumle Turkce ozet]\n[Kaynak](url)\n\n"
              "*4. Claude / Anthropic — [baslik]*\n[2-3 cumle Turkce ozet]\n[Kaynak](url)\n\n"
              "Kurallar:\n"
              "- Telegram Markdown v1: yalnizca *bold* ve [metin](url) kullan, baska ozel karakter yok\n"
              "- URL'ler yukardaki listeden alinmis gercek linkler olsun\n"
              "- Sadece mesaj metnini dondur, aciklama ekleme"
          )

          msg = client.messages.create(
              model="claude-opus-4-7",
              max_tokens=2000,
              messages=[{"role": "user", "content": prompt}]
          )
          text = msg.content[0].text.strip()
          print("Mesaj hazir ({} karakter), gonderiliyor...".format(len(text)))

          def tg_send(body_text, parse_mode="Markdown"):
              body = {"chat_id": CHAT_ID, "text": body_text, "disable_web_page_preview": True}
              if parse_mode:
                  body["parse_mode"] = parse_mode
              data = json.dumps(body).encode("utf-8")
              req = urllib.request.Request(
                  "https://api.telegram.org/bot{}/sendMessage".format(BOT_TOKEN),
                  data=data, headers={"Content-Type": "application/json"}, method="POST"
              )
              try:
                  with urllib.request.urlopen(req) as r:
                      return r.status, json.loads(r.read().decode())
              except urllib.error.HTTPError as e:
                  return e.code, json.loads(e.read().decode())

          MAX = 4096
          chunks = []
          if len(text) <= MAX:
              chunks = [text]
          else:
              parts, cur = text.split("\n\n"), ""
              for p in parts:
                  if len(cur) + len(p) + 2 <= MAX:
                      cur += ("\n\n" if cur else "") + p
                  else:
                      if cur: chunks.append(cur)
                      cur = p
              if cur: chunks.append(cur)

          ok = True
          for i, chunk in enumerate(chunks):
              status, res = tg_send(chunk)
              if status == 200 and res.get("ok"):
                  print("Parca {}/{} gonderildi.".format(i + 1, len(chunks)))
              else:
                  print("Markdown basarisiz (HTTP {}): {} - duz metin deneniyor...".format(status, res))
                  status2, res2 = tg_send(chunk, parse_mode=None)
                  if status2 == 200 and res2.get("ok"):
                      print("Parca {}/{} duz metin olarak gonderildi.".format(i + 1, len(chunks)))
                  else:
                      print("Gonderim basarisiz (HTTP {}): {}".format(status2, res2))
                      ok = False

          sys.exit(0 if ok else 1)
          PYEOF
